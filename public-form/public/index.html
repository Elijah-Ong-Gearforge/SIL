<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SIL 2026 Team Application</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f3f4f6; display: flex; justify-content: center; padding: 40px 20px; }
    .form-card { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
    h2 { margin-bottom: 5px; color: #111827; }
    p { color: #6b7280; font-size: 14px; margin-bottom: 25px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; color: #374151; font-size: 14px; }
    input[type="text"], input[type="email"], input[type="tel"], textarea { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
    .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; background: #fef2f2; padding: 12px; border: 1px solid #fca5a5; border-radius: 6px; }
    .checkbox-group input { margin-top: 4px; }
    .checkbox-group label { font-weight: normal; color: #991b1b; margin-bottom: 0; }
    button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
<div class="form-card">
  <h2>SIL 2026 Team Application</h2>
  <p>Apply to join our competitive programming team for the Singapore Informatics League.</p>
  <form action="/register" method="POST">
    <label>Full Name</label> <input type="text" name="full_name" required>
    <label>Email Address</label> <input type="email" name="email" required>
    <label>School / Institution</label> <input type="text" name="school" required>
    <label>Discord Tag</label> <input type="text" name="discord_tag" placeholder="username" required>
    <label>Phone Number (Optional)</label> <input type="tel" name="phone_number">
    
    <div class="checkbox-group">
      <input type="checkbox" id="cleared_dates" name="cleared_dates" value="true" required>
      <label for="cleared_dates">
        <strong>Attendance Confirmation:</strong> I confirm that I am completely free and can clear my schedule for:
        <br>• <strong>Prelims:</strong> 5 July 2026<br>• <strong>Finals:</strong> 15 August 2026
      </label>
    </div>

    <label>Preferred Languages</label> <input type="text" name="languages" placeholder="e.g., C++, Python" required>
    <label>Past Contests</label> <textarea name="past_contests" rows="3"></textarea>
    <label>Past Works & Workshops</label> <textarea name="past_works_workshops" rows="3"></textarea>
    <button type="submit">Submit Application</button>
  </form>
</div>
</body>
</html>
